<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flondy Dev</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--text:#ffffff;
--card:rgba(255,255,255,0.08);
--accent:#22c55e;
}

.light{
--bg:#f8fafc;
--text:#020617;
--card:rgba(255,255,255,0.7);
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* Aurora background */

.aurora{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%, #3b82f6, transparent 40%),
radial-gradient(circle at 70% 40%, #22c55e, transparent 40%),
radial-gradient(circle at 50% 80%, #a855f7, transparent 40%);
filter:blur(120px);
animation:auroraMove 20s infinite alternate linear;
z-index:-1;
opacity:0.6;
}

@keyframes auroraMove{
0%{transform:translate(-20%,-10%)}
100%{transform:translate(10%,20%)}
}

/* Header */

header{
padding:60px 20px 40px;
text-align:center;
}

h1{
font-size:42px;
margin:0;
}

.subtitle{
opacity:0.7;
margin-top:10px;
}

/* Toggle */

.toggle{
position:absolute;
top:20px;
right:20px;
cursor:pointer;
background:var(--card);
padding:8px 14px;
border-radius:30px;
backdrop-filter:blur(10px);
font-size:14px;
}

/* Grid */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
max-width:1100px;
margin:auto;
padding:40px 20px 60px;
}

/* Cards */

.card{
background:var(--card);
border-radius:20px;
padding:30px;
text-align:center;
backdrop-filter:blur(12px);
transition:0.25s;
}

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

.card img{
width:90px;
height:90px;
border-radius:22px;
margin-bottom:15px;
}

.card h3{
margin:8px 0;
font-weight:600;
}

.btn{
display:inline-block;
margin-top:12px;
padding:10px 18px;
border-radius:10px;
text-decoration:none;
font-weight:600;
background:var(--accent);
color:white;
transition:0.2s;
}

.btn:hover{
opacity:0.9;
}

/* Footer */

footer{
text-align:center;
padding:30px;
opacity:0.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="aurora"></div>

<div class="toggle" onclick="toggleTheme()">🌙 Dark / Light</div>

<header>
<h1>Flondy Dev</h1>
<div class="subtitle">Mobile Apps & Games</div>
</header>

<div class="container">

<div class="card">
<img src="/appicons/drop-it.png">
<h3>Stack Tower</h3>
<a class="btn" href="https://play.google.com/store/apps/details?id=dev.flondy.drop">Play Store</a>
</div>

<div class="card">
<img src="/appicons/basketball-pro.png">
<h3>Basketball Pro</h3>
<a class="btn" href="https://play.google.com/store/apps/details?id=dev.flondy.Basketball">Play Store</a>
</div>

<div class="card">
<img src="/appicons/wembi.png">
<h3>Wembi der kleine Vogel</h3>
<a class="btn" href="https://play.google.com/store/apps/details?id=dev.flondy.wembi">Play Store</a>
</div>

<div class="card">
<img src="/appicons/lumina.png">
<h3>Lumina AI</h3>
<a class="btn" href="https://lumina-ai-373390161457.us-west1.run.app">Open App</a>
</div>

<div class="card">
<img src="/appicons/my-notes.png">
<h3>Notizen & Listen</h3>
<a class="btn" href="https://play.google.com/store/apps/details?id=dev.flondy.mynotes">Play Store</a>
</div>

<div class="card">
<img src="/appicons/my-lamp.png">
<h3>LED Taschenlampe Pro</h3>
<a class="btn" href="https://play.google.com/store/apps/details?id=dev.flondy.mylamp">Play Store</a>
</div>

</div>

<footer>
© 2026 Flondy Dev
</footer>

<script>

function toggleTheme(){
document.body.classList.toggle("light")
}

</script>

</body>
</html>
